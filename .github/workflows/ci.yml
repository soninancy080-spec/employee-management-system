name: EMS Enterprise CI/CD Pipeline

on:
  push:
    branches: [ main, master, dev ]
  pull_request:
    branches: [ main, master, dev ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: admin1234
          POSTGRES_DB: ems_database_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v3

      - name: Setup Node.js Environment
        uses: actions/setup-node@v3
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        working-directory: ./backend
        run: npm ci

      - name: Run Prisma Client Generation
        working-directory: ./backend
        run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:admin1234@localhost:5432/ems_database_test?schema=public

      - name: Execute Jest Unit and Integration Tests
        working-directory: ./backend
        run: npm test
        env:
          DATABASE_URL: postgresql://postgres:admin1234@localhost:5432/ems_database_test?schema=public
          JWT_SECRET: supersecretjwtkey1234!
          NODE_ENV: test
